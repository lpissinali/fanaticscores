# Firebase App Hosting configuration for the Next.js app.
# This file lives in the nextjs/ subdirectory.
# Configure App Hosting in Firebase Console to point to this directory.

runConfig:
  runtime: nodejs20
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 100

env:
  # Server-side secret — add via: firebase apphosting:secrets:set AF_API_KEY
  - variable: AF_API_KEY
    secret: AF_API_KEY
    availability:
      - BUILD
      - RUNTIME

  # Firebase project
  - variable: FIREBASE_PROJECT_ID
    value: fanaticscores-b6af4
    availability:
      - BUILD
      - RUNTIME
